project_id: "vf-gned-ngdi-alpha-pltfrm-orch"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

finops_labels:
  source:
    version: v1.0.4
  depends_on: []
  spec:

network:
  source:
    version: v1.1.3
  depends_on:
    - finops_labels
  spec:
    - name: "test-vpc"
      finops_resource_type: "networking"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_goal: "networking"
        vf_ngdi_location: "europe-west2"
      auto_create_subnetworks: false
      routing_mode: "REGIONAL"
      subnets:
        - name: "private-subnet"
          ip_cidr_range: "10.0.2.0/24"
          enable_private_access: true

iam_service_account:
  source:
    version: v1.0.4
  spec: 
    - name: "test-sa"
      iam_project_roles:
        "vf-gned-ngdi-alpha-pltfrm-orch": 
          - "roles/logging.logWriter"
          - "roles/monitoring.metricWriter"
          - "roles/iam.serviceAccountUser"

compute_instance:
  source: 
    version: v1.0.0
  depends_on:
    - network
    - finops_labels
    - iam_service_account
  spec:
    - name: "test-vm1"
      zone: "europe-west2-a"
      machine_type: "e2-standard-4"
      boot_disk_image: "https://www.googleapis.com/compute/v1/projects/vf-grp-pcs-prd-images-01/global/images/vf-pcs-ubuntu-24-v04-2026-01-25t11-14-25z"
      boot_disk_size: 50
      network_name: "test-vpc"
      subnet_name: "vf-gned-ngdi-alpha-pltfrm-orch-subnet-private-subnet"
      service_account_email: "test-sa@vf-gned-ngdi-alpha-pltfrm-orch.iam.gserviceaccount.com"
      enable_secure_boot: true
      enable_integrity_monitoring: true
      enable_vtpm: true
      deletion_protection: false
      stack_type: "IPV4_ONLY"
      metadata:
        enable-oslogin: true
      finops_resource_type: "compute"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_location: "europe-west2"
    - name: "test-vm2"
      zone: "europe-west2-b"
      machine_type: "e2-standard-4"
      boot_disk_image: "https://www.googleapis.com/compute/v1/projects/vf-grp-pcs-prd-images-01/global/images/vf-pcs-ubuntu-24-v04-2026-01-25t11-14-25z"
      boot_disk_size: 50
      network_name: "test-vpc"
      subnet_name: "vf-gned-ngdi-alpha-pltfrm-orch-subnet-private-subnet"
      service_account_email: "test-sa@vf-gned-ngdi-alpha-pltfrm-orch.iam.gserviceaccount.com"
      enable_secure_boot: false
      enable_integrity_monitoring: false
      enable_vtpm: false
      deletion_protection: false
      stack_type: "IPV4_ONLY"
      metadata:
        enable-oslogin: true
      finops_resource_type: "compute"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_location: "europe-west2"
      attached_disks:
        app_data:
          self_link: "disk_link"
      