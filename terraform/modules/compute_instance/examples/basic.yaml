project_id: "project_id"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

finops_labels:
  source:
    version: v1.0.4
  depends_on: []
  spec:

network:
  source:
    version: v1.1.3
  depends_on:
    - finops_labels
  spec:
    - name: "example-vpc"
      finops_resource_type: "networking"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_goal: "networking"
        vf_ngdi_location: "europe-west2"
      auto_create_subnetworks: false
      routing_mode: "REGIONAL"
      subnets:
        - name: "private-subnet"
          ip_cidr_range: "10.0.2.0/24"
          enable_private_access: true

iam_service_account:
  source:
    version: v1.0.4
  spec: 
    - name: "example-sa"
      iam_project_roles:
        "project_id": 
          - roles

compute_instance:
  source: 
    version: v1.0.0
  depends_on:
    - network
    - finops_labels
    - iam_service_account
  spec:
    - name: "vm_name"
      zone: "zone"
      machine_type: "e2-standard-4"
      boot_disk_image: "image_url"
      boot_disk_size: 50
      boot_disk_kms_key: "projects/project_id/locations/europe-west2/keyRings/GKE-keyring/cryptoKeys/gke-key"
      network_name: "example-vpc"
      subnet_name: "project_id-subnet-private-subnet"
      service_account_email: "example-sa@project_id.iam.gserviceaccount.com"
      enable_secure_boot: true
      enable_integrity_monitoring: true
      enable_vtpm: true
      deletion_protection: false
      stack_type: "IPV4_ONLY"
      metadata:
        enable-oslogin: true
      finops_resource_type: "compute"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_location: "europe-west2"
      attached_disks:
        disk_name:
          self_link: "disk_self_link"