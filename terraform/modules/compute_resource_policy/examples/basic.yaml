project_id: "project_id"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

finops_labels:
  source:
    version: v1.0.4
  depends_on: []
  spec:

compute_resource_policy:
  source:
    version: v1.0.0
  depends_on:
    - finops_labels
  spec:
    - name: "example-policy"
      days_in_cycle: 1
      start_time: "04:00"
      max_retention_days: 14
      on_source_disk_delete: "KEEP_AUTO_SNAPSHOTS"
      finops_resource_type: "compute"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_location: "europe-west2"
      storage_locations: ["europe-west2"]