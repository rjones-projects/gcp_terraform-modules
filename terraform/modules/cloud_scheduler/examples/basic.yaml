project_id: "project_id"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

iam_service_account:
  source:
    version: v1.0.4
  spec: 
    - name: "example-sa"
      iam_project_roles:
        "project_id": 
          - "roles/cloudbuild.builds.editor"
          - "roles/iam.serviceAccountUser"

cloud_scheduler:
  source:
    version: v1.0.0
  depends_on:
    - iam_service_account
  spec:
    - name: "example-schedule"
      description: "An example schedule"
      schedule: "0 2 * * 0"
      time_zone: "UTC"
      http_target:
        http_method: "POST"
        uri: "https:test-uri"
        body: | 
          {
           "name": "Enter JSON"
          }
        auth_type: "oauth or oidc"
        service_account_email: "example-sa@project_id.iam.gserviceaccount.com" 