project_id: "project_id"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

iam_service_account:
  source:
    version: v1.0.3
  spec: 
    - name: "dataform-sa"
      iam_project_roles:
        "project_id": 
          - "roles/composer.worker"
      iam_storage_roles:
        "example_bucket":
          - "roles/storage.objectViewer"
