project_id: "project_id"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

iam_service_account:
  source:
    version: v1.0.4
  depends_on: []
  spec: 
    - name: "sa-name"
      # Grants serviceAccountUser role on the service account
      iam_bindings:
        "group: GROUP_NAME":
          - "roles/iam.serviceAccountUser"