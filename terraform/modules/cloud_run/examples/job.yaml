project_id: "my-project-id"
region: "europe-west1"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

project_services:
  source: 
    version: v1.0.3
  depends_on: []
  spec:
    - name: "cloud-run-required-apis"
      service_list:
        - "run.googleapis.com"
      service_config:
        disable_on_destroy: false
        disable_dependent_services: false

cloud_run:
  source:
    version: v1.0.2
  depends_on:
    - project_services
  spec:
    - name: "daily-etl"
      type: "JOB"
      deletion_protection: false
      containers:
        job:
          image: "europe-west1-docker.pkg.dev/my-project-id/cloud-run-source-deploy/daily-etl:latest"
          env:
            ENV: "alpha"
      job_config:
        task_count: 1
        max_retries: 2
        timeout: "3600s"
