project_id: "vf-gned-ngdi-alpha-pltfrm-orch"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

project_services:
  source:
    version: v1.0.2
  depends_on: []
  spec:
    - name: "cloud-run-required-apis"
      service_list:
        - "run.googleapis.com"
      service_config:
        disable_on_destroy: false
        disable_dependent_services: false

cloud_run:
  source:
    version: v1.0.1
  depends_on:
    - project_services
  spec:
    - name: "test-cloud-run"
      type: "SERVICE"
      deletion_protection: false
      containers:
        app:
          image: "europe-west1-docker.pkg.dev/vf-gned-ngdi-alpha-pltfrm-orch/cloud-run-source-deploy/test-cloud-run:latest"
