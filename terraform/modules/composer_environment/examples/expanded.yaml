project_id: "project_id"
region: "europe-west2"
env: alpha

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

iam_service_account:
  source:
    version: v1.0.3
  depends_on: []
  spec: 
    - name: "composer-sa"
      iam_project_roles:
        "PROJECT ID": 
          - "roles/composer.worker"
          - "roles/logging.logWriter"
          - "roles/monitoring.metricWriter"
          - "roles/iam.serviceAccountUser"

gcs:
  source:
    version: v1.1.5
  spec:
    - name: "terraform-composer-test1"
      location: "europe-west2"

network:
  source:
    version: v1.1.3
  depends_on:
  spec:
    - name: "test-vpc"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_goal: "networking"
        vf_ngdi_location: "europe-west2"
      subnets:
        - name: "private-subnet"
          ip_cidr_range: "10.0.2.0/24"
          enable_private_access: true
          allow_nat: false


composer_environment:
  source:
    version: v1.0.3
  depends_on:
    - gcs
    - iam_service_account
    - network
  spec:
    - name: "test-env"
      composer_service_account: "service_account_name@project_id.iam.gserviceaccount.com"
      network: "test-vpc"
      subnetwork: "private-subnet"
      grant_sa_agent_permission: true
      storage_bucket: "terraform-composer-test1"
      use_private_environment: true
      enable_private_builds_only: true
      scheduler: 
        cpu: 1
        memory_gb: 4
        storage_gb: 5
        count: 2
      dag_processor:
        cpu: 1
        memory_gb: 4
        storage_gb: 5
        count: 1
      web_server:
        cpu: 2
        memory_gb: 7.5
        storage_gb: 5
      worker:
        cpu: 1
        memory_gb: 5
        storage_gb: 3
        min_count: 1
        max_count: 2
      triggerer:
        cpu: 1
        memory_gb: 1
        count: 1