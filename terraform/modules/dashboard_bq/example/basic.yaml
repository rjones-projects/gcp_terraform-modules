project_id: "project_id"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

project_services:
  source:
    version: v1.0.3
  spec:
    - name: "monitoring"
      service_list:
        - "monitoring.googleapis.com"
      service_config:
        disable_on_destroy: false
        disable_dependent_services: false

dashboard_bq:
  source:
    version: v1.0.4
  depends_on:
    - project_services
  spec:
    enable_bq_dashabord: true