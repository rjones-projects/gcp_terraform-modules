project_id: "project_id"
region: "europe-central2"
env: alpha

terraform:
  required_version: ">= 1.14.0, < 2.0.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

finops_labels:
  source:
    version: v1.0.2
  depends_on: []
  spec:

network:
  source:
    version: v1.1.3
  depends_on:
    - finops_labels
  spec:
    - name: "main-vpc"
      finops_resource_type: "networking"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_goal: "networking"
        vf_ngdi_location: "europe-central2"

# Custom rules with FQDNs
#
# Demonstrates the use of Fully Qualified Domain Names (FQDNs)
# for ingress and egress rules.
# Note: Native GCP VPC Firewalls do not support FQDNs directly. 
# This requires Network Firewall Policies or a third-party integration.

firewall:
  source:
    version: v1.0.3
  depends_on:
    - network
  spec:
    - network: "main-vpc"
      default_rules_config:
        disabled: true
      egress_rules:
        allow-egress-github:
          deny: false
          description: "Allow egress to GitHub FQDNs."
          destination_fqdns:
            - "github.com"
            - "api.github.com"
          rules:
            - protocol: "tcp"
              ports:
                - "443"
      ingress_rules:
        allow-ingress-partner:
          deny: false
          description: "Allow HTTPS ingress from partner FQDN."
          source_fqdns:
            - "api.partner-network.com"
          rules:
            - protocol: "tcp"
              ports:
                - "443"