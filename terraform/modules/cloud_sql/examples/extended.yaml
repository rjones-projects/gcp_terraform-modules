project_id: "project_id"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

finops_labels:
  source:
    version: v1.0.4
  depends_on: []
  spec:

network:
  source:
    version: v1.1.3
  depends_on:
    - finops_labels
  spec:
    - name: "example-vpc"
      finops_resource_type: "networking"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_goal: "networking"
        vf_ngdi_location: "europe-west2"
      auto_create_subnetworks: false
      routing_mode: "REGIONAL"
      subnets:
        - name: "private-subnet"
          ip_cidr_range: "10.0.2.0/24"
          enable_private_access: true

dns:
  source:
    version: 1.0.0
  depends_on: 
    - network
  spec:
    - name: "test-dns"
      zone_config:
        domain: "testing.com."
        private: 
          client_networks: 
            - "projects/vf-gned-ngdi-alpha-pltfrm-orch/global/networks/test-vpc"
      recordsets:
       "A privatezone":
          type: "A"
          records:
            - "SQL DB private IP address"
          ttl:
            - 300

kms:
  source:
    version: v1.0.3
  depends_on: []
  spec:
    - keyring:
        location: "europe-central2"
        name: "keyring-project_id-europe-west2-sql"
      keys:
        cmek-project_id-europe-west2-sql:
          rotation_period: "7776000s"
          labels:
            env: "dev"
            owner: "platform"
          version_template:
            algorithm: "GOOGLE_SYMMETRIC_ENCRYPTION"
            protection_level: "HSM"
          iam:
            "roles/cloudkms.cryptoKeyEncrypterDecrypter":
              - "serviceAccount:service-project_number@gcp-sa-cloud-sql.iam.gserviceaccount.com"

cloud_sql:
  source:
    version: v1.0.0
  depends_on:
    - finops_labels
    - network
    - kms
  spec:
    - name: "example-instance"
      database_version: "POSTGRES_15"
      tier: "db-f1-micro"
      disk_size: 40
      ssl_mode: "ENCRYPTED_ONLY"
      deletion_protection: false
      databases:
        - "example_db"
      flags:
        max_connections: "1200"
      network_link: "projects/project_id/global/networks/example-vpc"
      psc_enabled: true
      psc_allowed_consumer_projects:
        - "project_id"
      enable_private_path_for_google_cloud_services: true
      encryption_key_name: "projects/project_id/locations/europe-west2/keyRings/keyring-project_id-europe-west2-sql/cryptoKeys/cmek-project_id-europe-west2-sql"
      finops_resource_type: "compute"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_goal: "networking"
        vf_ngdi_location: "europe-west2"
      read_replicas:
        - name: 'test-replica'
          tier: "db-f1-micro"
          disk_size: 10
          disk_type: "PD_SSD"
          zone: "europe-west2-a"
          encryption_key_name: "projects/project_id/locations/europe-west2/keyRings/keyring-project_id-europe-west2-sql/cryptoKeys/cmek-project_id-europe-west2-sql"
      secret_access_members:
        - "User:testuser1"
        - "User:testuser2" 
      backup_configuration:
        enabled: true
        start_time: "03:00"
        location: "europe-west3"
        point_in_time_recovery_enabled: false
        transaction_log_retention_days: 5
        retained_backups: 1
        retention_unit: ""