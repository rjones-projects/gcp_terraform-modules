project_id: "vf-gned-ngdi-alpha-pltfrm-orch"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

finops_labels:
  source:
    version: v1.0.1
  depends_on: []
  spec:
    - name: "project/default"
      resource_type: "project"
      resource_name: null
      input_labels: 
        vf_ngdi_environment: "alpha"
        vf_ngdi_owner      : "platform@example.com"
        vf_ngdi_shared     : "false"
        vf_ngdi_goal       : "foundation"
    
    - name: "gcs_bucket/test-bucket"
      resource_type: "gcs_bucket"
      resource_name: "test-bucket"
      input_labels: 
        vf_ngdi_environment: "beta"
        vf_ngdi_data_layer: "bronze"
        vf_ngdi_shared: "true"
        