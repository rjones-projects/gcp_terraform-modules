project_id: "PROJECT ID"
region: "europe-west2"
env: alpha

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

dns:
  source:
    version: 1.0.0
  depends_on: 
    - network
  spec:
  - name: "forwarding_zone"
    zone_config:
      domain: "test.example."
      forwarding:
        client_networks:
          - "projects/PROJECT_ID/global/networks/VPC_NAME"
        forwarders:
          "10.0.1.1": null
          "1.2.3.4": "private"