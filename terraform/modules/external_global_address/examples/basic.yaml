project_id: "project_id"
region: "europe-west1"

terraform:
  required_version: ">= 1.14.0, < 2.0.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

finops_labels:
  source:
    version: v1.0.2
  depends_on: []
  spec: []

external_global_address:
  source:
    version: v1.0.2
  depends_on:
    - finops_labels
  spec:
    - name: "my-global-ip"
      finops_resource_type: "networking"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_goal: "networking"
