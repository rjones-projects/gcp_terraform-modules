project_id: "project_id"
region: "europe-west2"

terraform:
  required_version: ">= 1.14.0"
  providers:
    google: ">= 7.17.0, < 8.0.0"

finops_labels:
  source:
    version: v1.0.4
  depends_on: []
  spec:

compute_disk:
  source:
    version: v1.0.0
  depends_on:
    - finops_labels
  spec:
    - name: example-disk
      disk_type: "pd-standard"
      zone: "europe-west2-a"
      disk_size: 50
      disk_encryption_key:
        kms_key_url: "projects/project_id/locations/europe-west2/keyRings/keyring_name/cryptoKeys/key_name"
      finops_resource_type: "compute"
      labels:
        vf_ngdi_environment: "alpha"
        vf_ngdi_shared: "true"
        vf_ngdi_location: "europe-west2"
      resource_policies:
        - "policy1"